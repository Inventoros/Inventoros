# Inventoros local dev stack.
#
# One-command boot:    docker compose up
# With Postgres:       docker compose --profile postgres up
# With Redis cache:    docker compose --profile redis up
# Both:                docker compose --profile postgres --profile redis up
#
# The default stack is app + mailpit using SQLite + database queue/cache/session.
# Postgres and Redis are opt-in via profiles so casual users get a zero-config boot.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "8.4"
    image: inventoros:dev
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_URL: http://localhost:${APP_PORT:-8080}
      # First-boot auto-seed: creates the e2e-test login + demo data so the
      # app has visible content immediately. Set to false to skip.
      DEV_AUTOSEED: ${DEV_AUTOSEED:-true}
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM_ADDRESS: dev@inventoros.local
      MAIL_FROM_NAME: Inventoros
    volumes:
      # Persist sqlite DB + storage across container restarts
      - app-data:/app/database
      - app-storage:/app/storage
      # Live-reload PHP source during dev. Comment out for production-style image use.
      - ./app:/app/app
      - ./routes:/app/routes
      - ./resources:/app/resources
      - ./config:/app/config
      - ./database/migrations:/app/database/migrations
      - ./database/seeders:/app/database/seeders
      - ./database/factories:/app/database/factories
    depends_on:
      - mailpit
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8025}:8025"   # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025"  # SMTP
    environment:
      MP_MAX_MESSAGES: 5000
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${DB_DATABASE:-inventoros}
      POSTGRES_USER: ${DB_USERNAME:-inventoros}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inventoros}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-inventoros}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  app-data:
  app-storage:
  postgres-data:
  redis-data:
