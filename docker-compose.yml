# Inventoros local dev stack.
#
# One-command boot:    docker compose up
# With Postgres:       docker compose --profile postgres up
# With Redis cache:    docker compose --profile redis up
# Both:                docker compose --profile postgres --profile redis up
#
# The default stack is app + worker + scheduler + mailpit using SQLite +
# database queue/cache/session. Postgres and Redis are opt-in via profiles so
# casual users get a zero-config boot.
#
# The `worker` container drains the database queue (WebhookDeliveryJob, queued
# mail, etc.) and the `scheduler` container runs `schedule:run` every minute so
# inventory:check-reorder-points and the retention prune commands actually fire.
# Without these, async work piles up in the `jobs`/`webhook_deliveries` tables
# and scheduled commands never run.

# Shared base for the three PHP containers (app, worker, scheduler). They run
# the same image and mount the same volumes so they see one SQLite DB + storage.
x-php: &php-base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      PHP_VERSION: "8.4"
  image: inventoros:dev
  environment: &php-env
    APP_URL: http://localhost:${APP_PORT:-8080}
    MAIL_MAILER: smtp
    MAIL_HOST: mailpit
    MAIL_PORT: 1025
    MAIL_FROM_ADDRESS: dev@inventoros.local
    MAIL_FROM_NAME: Inventoros
  volumes: &php-volumes
    # Persist sqlite DB + storage across container restarts (shared by all three)
    - app-data:/app/database
    - app-storage:/app/storage
    # Live-reload PHP source during dev. Comment out for production-style image use.
    - ./app:/app/app
    - ./routes:/app/routes
    - ./resources:/app/resources
    - ./config:/app/config
    - ./database/migrations:/app/database/migrations
    - ./database/seeders:/app/database/seeders
    - ./database/factories:/app/database/factories
  restart: unless-stopped

services:
  app:
    <<: *php-base
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - mailpit
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/up"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # Drains the database queue. Schema is owned by `app`, so RUN_MIGRATIONS=false.
  worker:
    <<: *php-base
    environment:
      <<: *php-env
      RUN_MIGRATIONS: "false"
    command: ["php", "artisan", "queue:work", "--tries=3", "--max-time=3600", "--sleep=3"]
    depends_on:
      app:
        condition: service_healthy
      mailpit:
        condition: service_started

  # Runs the Laravel scheduler once a minute (schedule:run is a single tick).
  scheduler:
    <<: *php-base
    environment:
      <<: *php-env
      RUN_MIGRATIONS: "false"
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    depends_on:
      app:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8025}:8025"   # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025"  # SMTP
    environment:
      MP_MAX_MESSAGES: 5000
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${DB_DATABASE:-inventoros}
      POSTGRES_USER: ${DB_USERNAME:-inventoros}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-inventoros}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-inventoros}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  app-data:
  app-storage:
  postgres-data:
  redis-data:
