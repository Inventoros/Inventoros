name: e2e

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: sqlite3, gd, bcmath

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Setup environment
        run: |
          cp .env.example .env
          sed -i 's|APP_URL=http://localhost|APP_URL=http://127.0.0.1:8000|' .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Build frontend assets
        run: npm run build

      - name: Seed database
        run: |
          php artisan migrate --force
          php artisan db:seed --class=ScreenshotSeeder --force

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 &
          sleep 3
          APP_URL=http://127.0.0.1:8000 npx playwright test \
            e2e/tests/dashboard.spec.ts \
            e2e/tests/products.spec.ts \
            e2e/tests/orders.spec.ts \
            --project=setup --project=chromium
        env:
          CI: true

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
